<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Mod Converter</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; text-align: center; }
        .hero { background: var(--card); padding: 40px; border-radius: 20px; margin-bottom: 20px; }
        .upload-zone { border: 2px dashed #475569; padding: 40px; border-radius: 15px; cursor: pointer; margin-bottom: 20px; }
        button { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #progress-bar { width: 100%; height: 8px; background: #334155; border-radius: 4px; margin-top: 20px; display: none; }
        #progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h1>Magic Mod Converter</h1>
    <div class="hero">
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <p id="statusMessage">クリックして .jar ファイルを選択</p>
            <input type="file" id="fileInput" hidden>
        </div>
        <button id="convertBtn" disabled>変換エンジンを起動</button>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
</div>

<script type="module">
    // --- 専門家たちの定義 ---
    
    // 【Loader】読み込み
    class ModLoader {
        async load(file) {
            console.log("解析中...");
            return { assets: [] }; // 本来はここでJSZip処理
        }
    }

    // 【Texture】変換
    class TextureConverter {
        async convert(entry) { return { path: "textures/blocks/test.png", blob: new Blob() }; }
    }

    // 【Validator】検証
    class Validator {
        validate(data) { return true; }
    }

    // 【Exporter】出力
    class ModExporter {
        async pack(list) { console.log("パッケージング完了"); }
        async download() { alert("ダウンロードを開始しました！"); }
    }

    // 【Engine】司令塔
    class ConversionEngine {
        constructor(callback) {
            this.loader = new ModLoader();
            this.texture = new TextureConverter();
            this.validator = new Validator();
            this.exporter = new ModExporter();
            this.onProgress = callback;
        }

        async run(file) {
            this.onProgress("解析中...", 20);
            const structure = await this.loader.load(file);
            this.onProgress("変換中...", 60);
            const output = [await this.texture.convert()];
            this.onProgress("梱包中...", 90);
            await this.exporter.pack(output);
            await this.exporter.download();
            this.onProgress("完了！", 100);
        }
    }

    // --- UIの管理 (app.js) ---
    const fileInput = document.getElementById('fileInput');
    const convertBtn = document.getElementById('convertBtn');
    const statusMsg = document.getElementById('statusMessage');
    const progBar = document.getElementById('progress-bar');
    const progFill = document.getElementById('progress-fill');

    fileInput.addEventListener('change', (e) => {
        if(e.target.files[0]) {
            statusMsg.innerText = `選択中: ${e.target.files[0].name}`;
            convertBtn.disabled = false;
        }
    });

    convertBtn.addEventListener('click', async () => {
        progBar.style.display = 'block';
        const engine = new ConversionEngine((msg, p) => {
            progFill.style.width = `${p}%`;
            console.log(msg);
        });
        await engine.run(fileInput.files[0]);
    });
</script>

</body>
</html>
